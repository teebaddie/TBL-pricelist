window.storage = {
  get: async (key) => { try { const v = localStorage.getItem(key); return v != null ? {value:v} : null; } catch(e){return null;} },
  set: async (key, value) => { try { localStorage.setItem(key, value); return {key,value}; } catch(e){return null;} },
  delete: async (key) => { try { localStorage.removeItem(key); return {key,deleted:true}; } catch(e){return null;} }
};

// ── PWA Manifest ──
(() => {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" fill="#000"/><text x="256" y="190" text-anchor="middle" font-family="Georgia,serif" font-size="88" fill="#f3c2d7">THE</text><text x="256" y="310" text-anchor="middle" font-family="Georgia,serif" font-size="88" fill="#f3c2d7">BADDIE</text><text x="256" y="420" text-anchor="middle" font-family="Georgia,serif" font-size="80" fill="#f3c2d7">LAB</text></svg>`;
  const icon = 'data:image/svg+xml,' + encodeURIComponent(svg);
  const m = {name:"The Baddie Lab — Price Calculator",short_name:"TBL Prices",start_url:"./",display:"standalone",background_color:"#000000",theme_color:"#000000",icons:[{src:icon,sizes:"512x512",type:"image/svg+xml"},{src:icon,sizes:"192x192",type:"image/svg+xml"}]};
  const ml = document.createElement('link'); ml.rel='manifest'; ml.href=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/json'})); document.head.appendChild(ml);
  const al = document.createElement('link'); al.rel='apple-touch-icon'; al.href=icon; document.head.appendChild(al);
})();

// ── Service Worker (inlined as blob) ──
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'tbl-v1';
    self.addEventListener('install', () => self.skipWaiting());
    self.addEventListener('activate', e => e.waitUntil(clients.claim()));
    self.addEventListener('fetch', e => {
      if (e.request.method !== 'GET') return;
      e.respondWith(
        caches.open(CACHE).then(cache =>
          cache.match(e.request).then(cached => {
            const network = fetch(e.request).then(res => {
              cache.put(e.request, res.clone());
              return res;
            }).catch(() => cached);
            return cached || network;
          })
        )
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}

function buildServicesFromStorage(storedData) {
  if (!storedData) return clone(DEFAULT_SERVICES);
  const out = {};
  const order = storedData.categories || Object.keys(DEFAULT_SERVICES);
  for (const cat of order) {
    const stored = storedData.services?.[cat];
    const defs = DEFAULT_SERVICES[cat] || [];
    if (stored && Array.isArray(stored)) {
      out[cat] = stored.map(si => {
        const def = defs.find(d => d.name === si.name);
        return def ? { ...def, price: Number(si.price) || 0 } : { name: si.name, price: Number(si.price) || 0 };
      });
    } else {
      out[cat] = clone(defs);
    }
  }
  return out;
}

    ? selectedItems.reduce((s, { service, qty }) => s + (service.autoDiscount || 0) * qty, 0) : 0;
  const manualDiscount = discounts.reduce((s, d) => {
    const v = parseFloat(d.value.replace(/[^0-9.]/g, "")) || 0;
    return s + (d.type === "percent" ? Math.round((v / 100) * totalAfterVat) : v);
  }, 0);
  const totalDiscount = consultDiscount + manualDiscount;
  const finalTotal = Math.max(0, totalAfterVat - totalDiscount);

  const clearAll = () => { setSelected({}); setSearch(""); setDiscounts([{ id: 1, value: "", type: "naira" }]); setSuppressConsultDiscount(false); };
  const addDiscount = () => setDiscounts(p => [...p, { id: Date.now(), value: "", type: "naira" }]);
  const removeDiscount = id => setDiscounts(p => p.filter(d => d.id !== id));
  const updateDiscount = (id, f, v) => setDiscounts(p => p.map(d => d.id === id ? { ...d, [f]: v, ...(f === "type" ? { value: "" } : {}) } : d));

  const filteredServices = useMemo(() => {
    if (!services || !search.trim()) return null;
    const q = search.toLowerCase();
    const res = [];
    for (const [cat, items] of Object.entries(services))
      items.forEach((s, idx) => s.name.toLowerCase().includes(q) && res.push({ cat, idx, service: s }));
    return res;
  }, [search, services]);

  const handleLockClick = () => {
    if (isAdmin) { setIsAdmin(false); setEditData(null); setAdminSearch(""); setAddForm(null); setActiveTab("select"); }
    else { setPwInput(""); setPwError(""); setShowPwModal(true); }
  };
  const handlePwSubmit = () => {
    if (pwInput === ADMIN_PASSWORD) {
      setIsAdmin(true); setShowPwModal(false); setPwInput(""); setPwError("");
      setEditData({ catOrder: Object.keys(services), prices: clone(services) });
      setActiveTab("admin");
    } else { setPwError("Incorrect password."); }
  };
  const setPrice = (cat, idx, val) => setEditData(p => { const n = clone(p); n.prices[cat][idx].price = val; return n; });
  const deleteService = (cat, idx) => setEditData(p => { const n = clone(p); n.prices[cat].splice(idx, 1); return n; });
  const addService = (cat) => {
    if (!addForm || addForm.cat !== cat) return;
    const name = addForm.name.trim(); if (!name) return;
    const price = parseInt(String(addForm.price).replace(/[^0-9]/g, ""), 10) || 0;
    setEditData(p => { const n = clone(p); if (!n.prices[cat]) n.prices[cat] = []; n.prices[cat].push({ name, price }); return n; });
    setAddForm(null);
  };
  const moveCat = (idx, dir) => setEditData(p => {
    const n = clone(p); const o = [...n.catOrder]; const t = idx + dir;
    if (t < 0 || t >= o.length) return p;
    [o[idx], o[t]] = [o[t], o[idx]]; return { ...n, catOrder: o };
  });
  const sortAlpha = () => setEditData(p => ({ ...p, catOrder: [...p.catOrder].sort((a, b) => a.localeCompare(b)) }));

  const handleSave = async () => {
    if (!editData) return;
    const finalServices = {}, storageServices = {};
    for (const cat of editData.catOrder) {
      const items = (editData.prices[cat] || []).map(item => ({ ...item, price: parseInt(String(item.price).replace(/[^0-9]/g, ""), 10) || 0 }));
      finalServices[cat] = items;
      storageServices[cat] = items.map(({ name, price }) => ({ name, price }));
    }
    try {
      await db.collection("settings").doc(STORAGE_KEY).set({
        value: JSON.stringify({ categories: editData.catOrder, services: storageServices })
      });
      // onSnapshot will update services state automatically for all devices
      setEditData({ catOrder: [...editData.catOrder], prices: clone(finalServices) });
      setSaveStatus("saved");
    } catch (e) {
      setSaveStatus("error");
      alert("Save failed: " + e.message);
    }
    setTimeout(() => setSaveStatus(""), 3000);
  };

  const handleReset = async () => {
    const fresh = clone(DEFAULT_SERVICES);
    const payload = JSON.stringify({
      categories: Object.keys(fresh),
      services: Object.fromEntries(Object.entries(fresh).map(([cat, items]) => [cat, items.map(({ name, price }) => ({ name, price }))]))
    });
    try {
      await db.collection("settings").doc(STORAGE_KEY).set({ value: payload });
      // onSnapshot will update services state automatically
      setEditData({ catOrder: Object.keys(DEFAULT_SERVICES), prices: clone(fresh) });
      setShowResetConfirm(false);
      setSaveStatus("saved");

      alert("Reset failed: " + e.message);

                          </div>

                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>

      {activeTab==="checkout" && (
        <div style={{ maxWidth:600, margin:"0 auto", padding:"20px 16px 60px" }}>
          {selectedItems.length===0 ? (
            <div style={{ textAlign:"center", padding:"60px 0" }}>
              <div style={{ fontSize:48, marginBottom:16 }}>🛒</div>
              <div style={{ fontSize:16, color:"#555" }}>No services selected yet</div>
              <button onClick={() => setActiveTab("select")} style={{ ...btn, marginTop:20, padding:"10px 24px", background:PINK, border:"none", borderRadius:20, color:"#000", fontSize:13, fontWeight:600 }}>Browse Services</button>
            </div>
          ) : (
            <>
              <div style={{ background:"#111", borderRadius:12, border:"1px solid #222", overflow:"hidden", marginBottom:14 }}>
                <div style={{ padding:"12px 16px", borderBottom:"1px solid #222", display:"flex", justifyContent:"space-between", alignItems:"center" }}>

                  <button onClick={clearAll} style={{ ...btn, fontSize:11, color:"#c55", background:"rgba(255,80,80,0.08)", border:"1px solid rgba(255,80,80,0.2)", borderRadius:6, padding:"4px 10px" }}>Clear All</button>

                            </div>
                            <div style={{ position:"relative", flex:1 }}>
                              <span style={{ position:"absolute", left:11, top:"50%", transform:"translateY(-50%)", color:PINK, fontSize:13 }}>{d.type==="naira"?"₦":"%"}</span>
                              <input className="fi" type="number" min="0" value={d.value} onChange={e => updateDiscount(d.id,"value",e.target.value)} placeholder={d.type==="naira"?"Amount…":"Percentage…"}
                                style={{ width:"100%", padding:"10px 12px 10px 26px", background:"#000", border:"1px solid #2a2a2a", borderRadius:8, color:"#fff", fontSize:13, fontFamily:"inherit" }} />
                            </div>
                            {discounts.length>1 && <button onClick={() => removeDiscount(d.id)} style={{ ...btn, width:30, height:30, borderRadius:"50%", border:"1px solid #333", background:"none", color:"#666", fontSize:18, flexShrink:0 }}>×</button>}
                          </div>
                          {d.type==="percent"&&raw>0 && <div style={{ fontSize:11, color:"#666", marginTop:4, paddingLeft:4 }}>= {fmt(equiv)} off total</div>}
                        </div>
                      );
                    })}
                  </div>
                  <button onClick={addDiscount} style={{ marginTop:10, width:"100%", padding:9, background:"transparent", border:`1px dashed rgba(243,194,215,0.3)`, borderRadius:8, color:PINK, fontFamily:"inherit", fontSize:12, cursor:"pointer" }}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor=PINK;e.currentTarget.style.background="rgba(243,194,215,0.05)"}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(243,194,215,0.3)";e.currentTarget.style.background="transparent"}}>
                    + Add Additional Discount
                  </button>
                </div>

                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", paddingTop:16, borderTop:`1px solid rgba(243,194,215,0.2)` }}>
                  <div>
                    <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:18, color:PINK }}>Amount Due</div>
                    {totalDiscount>0 && <div style={{ fontSize:11, color:"#7a9e7a", marginTop:2 }}>Saved {fmt(totalDiscount)}</div>}
                  </div>
                  <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:26, color:PINK, fontWeight:700 }}>{fmt(finalTotal)}</div>
                </div>
              </div>
            </>
          )}
        </div>
      )}

      {/* ── ADMIN TAB ── */}
      {activeTab==="admin"&&isAdmin&&editData && (
        <div style={{ maxWidth:780, margin:"0 auto", padding:"0 16px 90px" }}>
          <div style={{ position:"sticky", top:HEADER_H, zIndex:90, background:"#000", paddingTop:13, paddingBottom:11 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:11, gap:10, flexWrap:"wrap" }}>
              <div>
                <div style={{ fontSize:13, color:"#fff", fontWeight:600 }}>Edit Services</div>
                <div style={{ fontSize:10, color:"#555", marginTop:2 }}>Reorder · Add · Delete · Update prices</div>
              </div>
              <div style={{ display:"flex", gap:7, alignItems:"center", flexWrap:"wrap" }}>
                {saveStatus==="saved"&&<span style={{ fontSize:12, color:"#7a9e7a" }}>✓ Saved</span>}
                <button onClick={sortAlpha} style={{ ...btn, padding:"8px 13px", background:"transparent", border:"1px solid #333", borderRadius:8, color:"#888", fontSize:11 }}>Sort A–Z</button>
                <button onClick={() => setShowResetConfirm(true)} style={{ ...btn, padding:"8px 13px", background:"rgba(192,57,43,0.1)", border:"1px solid rgba(192,57,43,0.3)", borderRadius:8, color:"#e07070", fontSize:11 }}>Reset</button>
                <button onClick={handleSave} style={{ ...btn, padding:"8px 18px", background:PINK, border:"none", borderRadius:8, color:"#000", fontSize:12, fontWeight:700 }}>Save All</button>
              </div>
            </div>
            <div style={{ position:"relative" }}>
              <span style={{ position:"absolute", left:14, top:"50%", transform:"translateY(-50%)", color:"#555", fontSize:15 }}>🔍</span>
              <input value={adminSearch} onChange={e => setAdminSearch(e.target.value)} placeholder="Search services to edit…" className="fi"
                style={{ width:"100%", padding:"11px 40px 11px 42px", background:"#111", border:"1px solid #2a2a2a", borderRadius:10, color:"#fff", fontSize:14, fontFamily:"inherit" }} />
              {adminSearch && <button onClick={() => setAdminSearch("")} style={{ ...btn, position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:"#666", fontSize:20, padding:"0 4px" }}>×</button>}
            </div>
          </div>

          {editData.catOrder.map((cat, catIdx) => {
            const items=editData.prices[cat]||[];
            const searching=adminSearch.trim()!=="";
            const filtered=searching?items.map((s,i)=>({s,i})).filter(({s})=>s.name.toLowerCase().includes(adminSearch.toLowerCase())):items.map((s,i)=>({s,i}));
            if (searching&&filtered.length===0) return null;
            const isOpen=searching||editOpenCat===cat;
            const isAddingHere=addForm?.cat===cat;
            return (
              <div key={cat} style={{ marginBottom:7, border:"1px solid #222", borderRadius:10, overflow:"hidden" }}>
                <div style={{ display:"flex", alignItems:"stretch", background:isOpen?"rgba(243,194,215,0.06)":"#111" }}>
                  {!searching && (
                    <div style={{ display:"flex", flexDirection:"column", justifyContent:"center", padding:"0 6px 0 8px", gap:3, borderRight:"1px solid #1a1a1a" }}>
                      <button className="move-btn" onClick={() => moveCat(catIdx,-1)} disabled={catIdx===0}
                        style={{ ...btn, width:22, height:18, border:"1px solid #2a2a2a", background:"transparent", color:catIdx===0?"#222":"#666", cursor:catIdx===0?"default":"pointer", borderRadius:4, fontSize:9 }}>▲</button>
                      <button className="move-btn" onClick={() => moveCat(catIdx,1)} disabled={catIdx===editData.catOrder.length-1}
                        style={{ ...btn, width:22, height:18, border:"1px solid #2a2a2a", background:"transparent", color:catIdx===editData.catOrder.length-1?"#222":"#666", cursor:catIdx===editData.catOrder.length-1?"default":"pointer", borderRadius:4, fontSize:9 }}>▼</button>
                    </div>
                  )}
                  <div onClick={() => !searching&&setEditOpenCat(p => p===cat?null:cat)} className={searching?"":"cat-hdr"}
                    style={{ flex:1, display:"flex", justifyContent:"space-between", alignItems:"center", padding:"13px 16px", cursor:searching?"default":"pointer" }}>
                    <span style={{ fontSize:13, color:"#ccc" }}>{cat}</span>
                    <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                      <span style={{ fontSize:11, color:"#555" }}>{items.length} item{items.length!==1?"s":""}</span>
                      {!searching && <span style={{ color:"#555", fontSize:17, transform:isOpen?"rotate(180deg)":"none", transition:"transform 0.2s" }}>⌄</span>}
                    </div>
                  </div>
                </div>
                {isOpen && (
                  <div style={{ borderTop:"1px solid #222" }}>
                    {filtered.length===0&&!isAddingHere && <div style={{ padding:16, textAlign:"center", fontSize:12, color:"#444" }}>No services yet — add one below</div>}
                    {filtered.map(({ s:svc, i:idx }) => (
                      <div key={`${cat}-${idx}`} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 16px", borderBottom:"1px solid #181818" }}>
                        <div style={{ flex:1, marginRight:12 }}>
                          <div style={{ fontSize:13, color:"#ccc" }}>{svc.name}</div>
                          {svc.autoDiscount && <div style={{ fontSize:10, color:"#7a9e7a", marginTop:1 }}>Includes ₦5,000 auto-discount</div>}
                        </div>
                        <div style={{ display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
                          <span style={{ color:PINK, fontSize:13 }}>₦</span>
                          <input className="fi" type="number" min="0" value={svc.price} onChange={e => setPrice(cat,idx,e.target.value)}
                            style={{ width:120, padding:"8px 10px", background:"#000", border:"1px solid #2a2a2a", borderRadius:8, color:"#fff", fontSize:13, fontFamily:"inherit", textAlign:"right" }} />
                          <button className="del-btn" onClick={() => deleteService(cat,idx)}
                            style={{ ...btn, width:30, height:30, borderRadius:6, border:"1px solid #2a2a2a", background:"transparent", color:"#555", fontSize:14 }}>🗑</button>
                        </div>
                      </div>
                    ))}
                    {!searching && (isAddingHere ? (
                      <div style={{ padding:"14px 16px", borderTop:"1px solid #1a1a1a", background:"rgba(243,194,215,0.03)" }}>
                        <div style={{ fontSize:11, color:PINK, letterSpacing:1, textTransform:"uppercase", marginBottom:10 }}>New Service</div>
                        <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                          <input autoFocus className="fi" placeholder="Service name" value={addForm.name} onChange={e => setAddForm(p=>({...p,name:e.target.value}))}
                            style={{ flex:2, minWidth:140, padding:"9px 12px", background:"#000", border:"1px solid #2a2a2a", borderRadius:8, color:"#fff", fontSize:13, fontFamily:"inherit" }} />
                          <div style={{ position:"relative", flex:1, minWidth:110 }}>
                            <span style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", color:PINK, fontSize:12 }}>₦</span>
                            <input className="fi" type="number" min="0" placeholder="Price" value={addForm.price} onChange={e => setAddForm(p=>({...p,price:e.target.value}))} onKeyDown={e => e.key==="Enter"&&addService(cat)}
                              style={{ width:"100%", padding:"9px 10px 9px 24px", background:"#000", border:"1px solid #2a2a2a", borderRadius:8, color:"#fff", fontSize:13, fontFamily:"inherit" }} />
                          </div>
                          <button onClick={() => addService(cat)} style={{ ...btn, padding:"9px 18px", background:PINK, border:"none", borderRadius:8, color:"#000", fontSize:12, fontWeight:700, flexShrink:0 }}>Add</button>
                          <button onClick={() => setAddForm(null)} style={{ ...btn, padding:"9px 13px", background:"transparent", border:"1px solid #333", borderRadius:8, color:"#666", fontSize:12, flexShrink:0 }}>Cancel</button>
                        </div>
                      </div>
                    ) : (
                      <button onClick={() => { setAddForm({cat,name:"",price:""}); setEditOpenCat(cat); }}
                        style={{ ...btn, width:"100%", padding:11, background:"transparent", border:"none", borderTop:"1px solid #1a1a1a", color:PINK, fontFamily:"inherit", fontSize:12, cursor:"pointer" }}
                        onMouseEnter={e=>e.currentTarget.style.background="rgba(243,194,215,0.04)"}
                        onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                        + Add Service to {cat}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            );
          })}

          <div style={{ position:"fixed", bottom:0, left:0, right:0, background:"#000", borderTop:"1px solid rgba(192,57,43,0.25)", padding:"12px 20px", display:"flex", justifyContent:"space-between", alignItems:"center", zIndex:100 }}>
            <div style={{ fontSize:11, color:"#555" }}>{editData.catOrder.length} categories · {editData.catOrder.reduce((s,c)=>s+(editData.prices[c]?.length||0),0)} services</div>
            <div style={{ display:"flex", gap:10, alignItems:"center" }}>
              {saveStatus==="saved"&&<span style={{ fontSize:12, color:"#7a9e7a" }}>✓ Saved</span>}
              <button onClick={handleSave} style={{ ...btn, padding:"9px 22px", background:PINK, border:"none", borderRadius:20, color:"#000", fontSize:12, fontWeight:700 }}>Save All Changes</button>
            </div>
          </div>
        </div>
      )}

      {/* STICKY BILL BAR */}
      {selectedItems.length>0&&activeTab==="select" && (
        <div onClick={() => setActiveTab("checkout")} style={{ position:"fixed", bottom:0, left:0, right:0, background:"#000", borderTop:`1px solid rgba(243,194,215,0.3)`, padding:"13px 20px", display:"flex", justifyContent:"space-between", alignItems:"center", cursor:"pointer", zIndex:100 }}>
          <div>
            <div style={{ fontSize:11, color:"#555", letterSpacing:1 }}>{selectedItems.length} service{selectedItems.length!==1?"s":""} selected</div>
            <div style={{ fontSize:13, color:PINK, marginTop:2 }}>
              {fmt(subtotal)} + VAT = <strong>{fmt(totalAfterVat)}</strong>
              {totalDiscount>0&&<span style={{ color:"#7a9e7a", marginLeft:6 }}>→ {fmt(finalTotal)} after discounts</span>}
            </div>
          </div>
          <div style={{ background:PINK, color:"#000", padding:"8px 18px", borderRadius:20, fontSize:12, fontWeight:700, letterSpacing:1, flexShrink:0 }}>VIEW BILL →</div>
        </div>
      )}

      {showBackTop && (
        <button className="back-top" onClick={() => window.scrollTo({top:0,behavior:"smooth"})}
          style={{ ...btn, position:"fixed", bottom:selectedItems.length>0&&activeTab==="select"?78:22, right:18, zIndex:200, background:"rgba(0,0,0,0.85)", border:`1px solid ${PINK}`, color:PINK, borderRadius:"50%", width:40, height:40, fontSize:17 }}>↑</button>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
